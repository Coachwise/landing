<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Params.footer.tagline }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Params.description | default .Site.Params.description }}">
<meta name="theme-color" content="#0E0E55">

<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:title" content="{{ .Site.Title }} — {{ .Params.hero.title }}">
<meta property="og:description" content="{{ .Params.description }}">
<meta property="og:locale" content="{{ .Site.Language.LanguageCode }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ "img/icon.svg" | absURL }}">
<meta name="twitter:card" content="summary">

{{ range .Translations }}
  <link rel="alternate" hreflang="{{ .Site.Language.Lang }}" href="{{ .Permalink }}">
{{ end }}
<link rel="alternate" hreflang="{{ .Site.Language.Lang }}" href="{{ .Permalink }}">

<link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
<link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">

{{/* Self-hosted: Google Fonts is an unreliable dependency for users in Iran. */}}
<link rel="preload" href="{{ "fonts/Vazirmatn-var.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ "fonts/Lalezar-arabic.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>

{{ with resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}">
{{ end }}
